<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stasis Sound</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">Stasis Sound</div>
        <ul>
            <li><a href="home.html" data-link="home">Home</a></li>
            <li><a href="works.html" data-link="works">Works</a></li>
            <li><a href="live.html" data-link="live">Live</a></li>
            <li><a href="sound-design.html" data-link="sound-design">Sound Design</a></li>
            <li><a href="about.html" data-link="about">About</a></li>
        </ul>
    </nav>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Main Content -->
    <main id="content"></main>

<!-- Music Player -->
<div class="player">
    <button id="prev-track">⏮</button>
    <button id="play-pause">▶</button>
    <span id="track-title">Loading...</span>
    <button id="next-track">⏭</button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
</div>

<audio id="music-player" preload="auto"></audio>

    <!-- JS Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="js/particles-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/player.js"></script>



</body>
</html>
