<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stasis Sound</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="pre-intro">

    <!-- Navigation -->
    <button class="mobile-menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav-list" aria-label="Open menu">Menu</button>
    <nav aria-label="Primary">
        <ul id="site-nav-list">
            <li><a href="home.html" data-link="home">Home</a></li>
            <li><a href="works.html" data-link="works">Composition</a></li>
            <li><a href="live.html" data-link="live">Live</a></li>
            <li><a href="sound-design.html" data-link="sound-design">Sound Design</a></li>
            <li><a href="about.html" data-link="about">About</a></li>
            <li><a href="visitors.html" data-link="visitors">Visitors</a></li>
        </ul>
    </nav>

    <!-- Background Layers -->
    <div class="texture-bg" aria-hidden="true"></div>
    <div id="particles-js" aria-hidden="true"></div>
    <button id="intro-logo-trigger" aria-label="Start audio and intro animation"></button>
    <p id="intro-open-note">audio up, explore deliberately</p>

    <!-- Center Hero Brand -->
    <div class="brand-hero" aria-label="Stasis Sound">
        <div class="logo">
            <span class="logo-word logo-word-left" aria-hidden="true">stasis</span>
            <span class="logo-mark" aria-hidden="true"></span>
            <span class="logo-word logo-word-right" aria-hidden="true">sound</span>
        </div>
    </div>

    <!-- Main Content -->
    <main id="content"></main>

<!-- Music Player -->
<div class="player">
    <button id="prev-track">⏮</button>
    <button id="play-pause">▶</button>
    <span id="track-title">Loading...</span>
    <button id="next-track">⏭</button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
</div>

<audio id="music-player" preload="auto"></audio>

    <!-- JS Libraries -->
    <script src="js/ambient-particles.js"></script>
    <script src="js/app.js"></script>
    <script src="js/visitors-config.js"></script>
    <script src="js/home-visitors.js"></script>
    <script src="js/releases-data.js"></script>
    <script src="js/works.js"></script>
    <script src="js/live-data.js"></script>
    <script src="js/live.js"></script>
    <script src="js/sound-design-data.js"></script>
    <script src="js/sound-design.js"></script>
    <script src="js/about-data.js"></script>
    <script src="js/about.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ui-sounds.js"></script>



</body>
</html>
