<section class="visitors-shell" aria-labelledby="visitors-page-title">
    <header class="visitors-header">
        <h2 id="visitors-page-title">Visitors</h2>
        <p>a live particle garden. Hover a particle to reveal an echo.</p>
        <p class="visitors-mobile-note">Commenting is only available on desktop.</p>
    </header>

    <ol id="visitor-feed" class="visitor-feed visitor-feed-floating"></ol>

    <section class="visitors-panel" aria-labelledby="visitors-title">
        <div class="visitors-head">
            <h3 id="visitors-title">Leave an Echo</h3>
        </div>
        <form id="visitor-form" class="visitor-form" autocomplete="off">
            <label class="visitor-field">
                <span>Name (set once)</span>
                <input id="visitor-name" name="visitor-name" type="text" maxlength="24" required>
            </label>
            <label class="visitor-field">
                <span>Comment</span>
                <textarea id="visitor-message" name="visitor-message" rows="3" maxlength="220" required></textarea>
            </label>
            <button id="visitor-submit" type="submit" data-ui-sound="player">Post</button>
            <p id="visitor-note" class="visitor-note" aria-live="polite"></p>
        </form>
    </section>
</section>
