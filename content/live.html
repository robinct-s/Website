<section class="live-shell" aria-labelledby="live-title">
    <header class="live-header">
        <h2 id="live-title">Performance</h2>
        <p>Upcoming performances are listed first, followed by an archive of past dates.</p>
    </header>

    <section class="live-block" aria-labelledby="live-upcoming">
        <div class="live-block-head">
            <h3 id="live-upcoming">Upcoming</h3>
            <span class="live-block-count" id="live-upcoming-count">0 events</span>
        </div>
        <ul class="live-list live-list-upcoming" id="live-upcoming-list"></ul>
    </section>

    <section class="live-block" aria-labelledby="live-archive">
        <div class="live-block-head">
            <h3 id="live-archive">Archive</h3>
            <span class="live-block-count" id="live-archive-count">0 events</span>
        </div>
        <ul class="live-list live-list-archive" id="live-archive-list"></ul>
    </section>
</section>
